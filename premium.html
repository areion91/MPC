<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Stream4Stream | Playlist Premium
    </title>

    <link rel="stylesheet"
          href="premium.css">

</head>

<body>

    <!-- PROFILE -->
    <div id="profileBtn">
        <img id="avatar">
    </div>

    <!-- HEADER -->
    <div class="header">

        <h1>
            PLAYLIST PREMIUM
        </h1>

    </div>

    <!-- PLAYLISTS -->
    <div class="playlistList">

        <!-- PRIME -->
        <div class="playlistItem"
             id="prime">

            <div class="disc">
                <img id="primeCover">
            </div>

            <div class="playlistInfo">

                <h2>

                    <span id="primeTitle">
                        PRIME ZONE
                    </span>

                </h2>

                <p>

                    <span id="primeDesc">
                    </span>

                    <span id="editPrimeDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>

        <!-- UPMOOD -->
        <div class="playlistItem"
             id="upmoo">

            <div class="disc">
                <img id="upmooCover">
            </div>

            <div class="playlistInfo">

                <h2>

                    <span id="upmooTitle">
                        UPMOOD
                    </span>

                </h2>

                <p>

                    <span id="upmooDesc">
                    </span>

                    <span id="editUpmooDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>

        <!-- LAGI MELLOW -->
        <div class="playlistItem"
             id="lgmel">

            <div class="disc">
                <img id="lgmelCover">
            </div>

            <div class="playlistInfo">

                <h2>

                    <span id="lgmelTitle">
                        LAGI MELLOW
                    </span>

                </h2>

                <p>

                    <span id="lgmelDesc">
                    </span>

                    <span id="editLgmelDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>

        <!-- CHILL -->
        <div class="playlistItem"
             id="cahin">

            <div class="disc">
                <img id="cahinCover">
            </div>

            <div class="playlistInfo">

                <h2>

                    <span id="cahinTitle">
                        CHILL & HEAL
                    </span>

                </h2>

                <p>

                    <span id="cahinDesc">
                    </span>

                    <span id="editCahinDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>

        <!-- GLOBAL -->
        <div class="playlistItem"
             id="gimix">

            <div class="disc">
                <img id="gimixCover">
            </div>

            <div class="playlistInfo">

                <h2>

                    <span id="gimixTitle">
                        GLOBAL INDIE MIX
                    </span>

                </h2>

                <p>

                    <span id="gimixDesc">
                    </span>

                    <span id="editGimixDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>

        <!-- BREAKBEAT -->
        <div class="playlistItem"
             id="bbris">

            <div class="disc">
                <img id="bbrisCover">
            </div>

            <div class="playlistInfo">

                <h2>

                    <span id="bbrisTitle">
                        BREAKBEAT RISING
                    </span>

                </h2>

                <p>

                    <span id="bbrisDesc">
                    </span>

                    <span id="editBbrisDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>

        <!-- INDIE NEW MIX -->
        <div class="playlistItem"
             id="inmix">

            <div class="disc">
                <img id="inmixCover">
            </div>

            <div class="playlistInfo">

                <h2>

                    <span id="inmixTitle">
                        INDIE NEW MIX
                    </span>

                </h2>

                <p>

                    <span id="inmixDesc">

                    <span id="editInmixDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>

    </div>

    <!-- EQUALIZER -->
    <div class="equalizer"
         id="equalizer">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <script type="module"
            src="premium.js">
    </script>

</body>

</html>
