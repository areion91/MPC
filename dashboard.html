<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Stream4Stream | Dashboard
    </title>

    <link rel="stylesheet"
          href="dashboard.css">

</head>

<body>

    <div class="container">

        <div class="box">

            <!-- PROFILE -->

            <div id="profileBtn">

                <img id="avatar">

            </div>

            <!-- NOTES -->

            <div class="notes">

                ♪ ♫ ♪ ♫ ♪

            </div>

            <!-- TITLE -->

            <div class="title">

                <h1>

                    STREAM4STREAM

                </h1>

                <p>

                    COMMUNITY HUB

                </p>

            </div>

            <!-- WELCOME -->

            <div id="welcome">

                WELCOME...

            </div>

            <!-- DISC AREA -->

            <div class="discContainer">

                <!-- FREE -->

                <div class="discBox">

                    <div id="free"
                         class="disc freeDisc">

                        <div class="discCenter">

                            FREE

                        </div>

                    </div>

                    <h2>

                        <span id="freeTitle">

                            FREE

                        </span>

                        <span id="editFreeTitle"
                              class="edit">

                            ✏

                        </span>

                    </h2>

                    <p>

                        <span id="freeDesc">

                        </span>

                        <span id="editFreeDesc"
                              class="edit">

                            ✏

                        </span>

                    </p>

                </div>

                <!-- PREMIUM -->

                <div class="discBox">

                    <div id="premium"
                         class="disc premiumDisc">

                        <div class="discCenter premiumCenter">

                            PREMIUM

                        </div>

                    </div>

                    <h2>

                        <span id="premiumTitle">

                            PREMIUM

                        </span>

                        <span id="editPremiumTitle"
                              class="edit">

                            ✏

                        </span>

                    </h2>

                    <p>

                        <span id="premiumDesc">

                        </span>

                        <span id="editPremiumDesc"
                              class="edit">

                            ✏

                        </span>

                    </p>

                </div>

            </div>

            <!-- ADMIN PANEL -->

            <div id="adminArea"
                 class="adminArea">

                <button id="adminBtn">

                    ⚙ ADMIN PANEL

                </button>

            </div>

            <!-- EQUALIZER -->

            <div class="equalizer"
                 id="equalizer">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

        </div>

    </div>

    <script type="module"
            src="dashboard.js">
    </script>

</body>

</html>
