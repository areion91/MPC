<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>Stream4Stream</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="box">

        <!-- AVATAR -->
        <img
        id="avatar"
        class="avatar"
        src="avatar.png">

        <!-- ICON -->
        <div class="music-icons">
            ♪ ♬ ♪ ♬ ♪
        </div>

        <!-- TITLE -->
        <h1>STREAM4STREAM</h1>

        <p class="subtitle">
            COMMUNITY HUB
        </p>

        <!-- WELCOME -->
        <div class="welcome">
            WELCOME,
            <span id="username">
                MEMBER
            </span>
        </div>

        <!-- PLAYLIST -->
        <div class="playlists">

            <!-- FREE -->
            <div class="cd-card"
            onclick="location.href='free.html'">

                <div class="cd free-cd">

                    <div class="center-hole"></div>

                    <div class="cd-label">
                        FREE
                    </div>

                </div>

                <div class="cd-title">
                    FREE
                </div>

            </div>

            <!-- PREMIUM -->
            <div class="cd-card"
            onclick="location.href='premium.html'">

                <div class="cd premium-cd">

                    <div class="center-hole"></div>

                    <div class="cd-label">
                        PREMIUM
                    </div>

                </div>

                <div class="cd-title">
                    PREMIUM
                </div>

            </div>

        </div>

        <!-- ADMIN -->
        <div id="adminArea"
        class="adminArea">

            <button id="adminBtn">
                ⚙ ADMIN PANEL
            </button>

        </div>

        <!-- EQUALIZER -->
        <div class="equalizer">

            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>

        </div>

    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
