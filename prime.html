<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
    PRIME ZONE
</title>

<link rel="stylesheet"
      href="prime.css">

</head><body><!-- BACK -->

<div id="backBtn">
    ← BACK
</div>

<!-- PROFILE -->

<div id="profileBtn">
    <img id="avatar">
</div>
      
<!-- PLAYLIST HEADER --><div class="playlistHeader"><div class="playlistCover">

    <img id="playlistCover">

</div>

<div class="playlistInfo">

    <h1 id="playlistTitle">

        PRIME ZONE

    </h1>

    <div id="playlistDesc">

        Dreamy healing night vibe.

    </div>

    <div class="progressRow">

        <div class="progressBar">

            <div id="progressFill">

            </div>

        </div>

        <span id="progressValue">

            0%

        </span>

    </div>

</div>

</div><!-- CHECK IN --><div class="checkArea"><button id="checkinBtn">

    CHECK IN

</button>

</div>

<!-- TABS -->

<div class="tabs">

    <button class="tab active"
            data-tab="songs">

        SONG

    </button>

    <button class="tab"
            data-tab="yoursong">

        YOUR SONG

    </button>

    <button class="tab"
            data-tab="activity">

        ACTIVITY

    </button>

</div>

<!-- CONTENT -->

<div class="content">

    <!-- SONG -->

    <div class="tabContent active"
         id="songs">

        <div id="songList">

            <div class="songItem">

                Loading...

            </div>

        </div>

    </div>

    <!-- YOUR SONG -->

    <div class="tabContent"
         id="yoursong">

        <div class="empty">

            YOUR SONG EMPTY

        </div>

    </div>

    <!-- ACTIVITY -->

    <div class="tabContent"
         id="activity">

        <div id="activityList">

            <div class="activityItem">

                No activity.

            </div>

        </div>

    </div>

</div>

<script type="module"
        src="prime.js">

</script>

</body>
</html>
