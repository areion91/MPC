<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stream4Stream | Dashboard</title>

    <link rel="stylesheet"
          href="dashboard.css">

</head>

<body>

    <div class="container">

        <div class="box">

            <div id="profileBtn">
                <img id="avatar">
            </div>

            <div class="notes">
                ♪ ♫ ♪ ♫ ♪
            </div>

            <div class="title">

                <h1>STREAM4STREAM</h1>

                <p>COMMUNITY HUB</p>

            </div>

            <div id="welcome">
                WELCOME...
            </div>

            <div class="playlist">

                <h2 id="indieTitle">
                    > INDIE TRENDING
                </h2>

                <p id="indieDesc">
                    DISCOVER THE LATEST INDIE TRACKS
                </p>

                <button id="indie">
                    OPEN PLAYLIST
                </button>

            </div>

            <div class="playlist">

                <h2 id="primeTitle">
                    > PRIMEZONE
                </h2>

                <p id="primeDesc">
                    PREMIUM CURATED PLAYLIST
                </p>

                <button id="prime">
                    OPEN PLAYLIST
                </button>

            </div>

            <button id="manage"
                    style="display:none;">
                MANAGE
            </button>

            <button id="logout">
                LOGOUT
            </button>

            <div class="equalizer"
                 id="equalizer">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

        </div>

    </div>

    <script src="dashboard.js"></script>

</body>

</html>
