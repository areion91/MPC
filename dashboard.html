<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Stream4Stream
    </title>

    <link rel="stylesheet"
          href="dashboard.css">

</head>

<body>

    <div class="container">

        <div class="box">

            <!-- PROFILE -->

            <div id="profileBtn">
                <img id="avatar">
            </div>

            <!-- NOTES -->

            <div class="notes">
                ♪ ♫ ♪ ♫ ♪
            </div>

            <!-- TITLE -->

            <div class="title">

                <h1>
                    STREAM4STREAM
                </h1>

                <p>
                    COMMUNITY HUB
                </p>

            </div>

            <!-- WELCOME -->

            <div id="welcome">
                WELCOME...
            </div>

            <!-- DISC AREA -->

            <div class="discContainer">

                <!-- FREE -->

                <div class="discBox">

                    <div id="indie"
                         class="disc freeDisc">

                        <div class="discCenter">
                            FREE
                        </div>

                    </div>

                    <h2>

                        <span id="indieTitle">
                            FREE
                        </span>

                        <span id="editIndieTitle"
                              class="edit">
                            ✏
                        </span>

                    </h2>

                    <p>

                        <span id="indieDesc">
                            COMMUNITY ACCESS
                        </span>

                        <span id="editIndieDesc"
                              class="edit">
                            ✏
                        </span>

                    </p>

                </div>

                <!-- PREMIUM -->

                <div class="discBox">

                    <div id="prime"
                         class="disc primeDisc">

                        <div class="discCenter">
                            PRIME
                        </div>

                    </div>

                    <h2>

                        <span id="primeTitle">
                            PREMIUM
                        </span>

                        <span id="editPrimeTitle"
                              class="edit">
                            ✏
                        </span>

                    </h2>

                    <p>

                        <span id="primeDesc">
                            MEMBER ACCESS
                        </span>

                        <span id="editPrimeDesc"
                              class="edit">
                            ✏
                        </span>

                    </p>

                </div>

            </div>

            <!-- EQUALIZER -->

            <div class="equalizer"
                 id="equalizer">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

        </div>

    </div>

    <script type="module"
            src="dashboard.js">
    </script>

</body>

</html>
