<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1.0">

    <title>

        Stream4Stream Admin

    </title>

    <link rel="stylesheet"
          href="admin.css">

</head>

<body>

<div class="container">

    <div class="box">

        <!-- NOTES -->

        <div class="notes">

            ♪ ♫ ♪ ♫ ♪

        </div>

        <!-- TITLE -->

        <div class="title">

            <h1>

                ADMIN HUB

            </h1>

            <p>

                STREAM4STREAM

            </p>

        </div>

        <!-- STATUS -->

        <div id="status">

            READY

        </div>

        <!-- MENU -->

        <div class="menuContainer">

            <!-- JOIN -->

            <div class="menuCard"
                 onclick="location.href='joinre.html'">

                <div class="menuTitle">

                    JOIN REQUEST

                </div>

                <div id="joinCount"
                     class="badge">

                    0

                </div>

            </div>

            <!-- SONG -->

            <div class="menuCard gold"
                 onclick="location.href='songre.html'">

                <div class="menuTitle">

                    SONG REQUEST

                </div>

                <div id="songCount"
                     class="badge">

                    0

                </div>

            </div>

            <!-- SYNC -->

            <div id="syncBtn"
                 class="menuCard">

                <div class="menuTitle">

                    SYNC

                </div>

            </div>

            <!-- ANNOUNCEMENT -->

            <div id="announceBtn"
                 class="menuCard">

                <div class="menuTitle">

                    ANNOUNCEMENT

                </div>

            </div>

        </div>

        <!-- POPUP -->

        <div id="announcePopup"
             class="popup">

            <div class="popupBox">

                <h2>

                    ANNOUNCEMENT

                </h2>

                <textarea id="announceText"
                          placeholder="Write announcement...">
                </textarea>

                <div class="popupButtons">

                    <button id="saveAnnouncement">

                        SAVE

                    </button>

                    <button id="closeAnnouncement">

                        CLOSE

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module"
        src="admin.js">
</script>

</body>

</html>
