<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stream4Stream | Profile</title>

    <link rel="stylesheet"
          href="profile.css">

</head>

<body>

    <div class="container">

        <div class="box">

            <!-- BACK -->
            <div id="backBtn">
                ← BACK
            </div>

            <!-- TITLE -->
            <h1>
                PROFILE
            </h1>

            <!-- AVATAR -->
            <div class="avatarBox">

                <img id="profileAvatar">

            </div>

            <!-- NAME -->
            <div class="inputBox">

                <label>
                    NAME
                </label>

                <input type="text"
                       id="profileName">

            </div>

            <!-- PHONE -->
            <div class="inputBox">

                <label>
                    PHONE
                </label>

                <input type="text"
                       id="profilePhone">

            </div>

            <!-- LAST FM -->
            <div class="inputBox">

                <label>
                    LAST.FM ACCOUNTS
                </label>

                <!-- SLOT 1 -->
                <div class="lastfmRow">

                    <input type="text"
                           id="lastfm1"
                           placeholder="USERNAME">

                    <span class="primaryBtn"
                          data-slot="1">
                        ●
                    </span>

                </div>

                <!-- SLOT 2 -->
                <div class="lastfmRow"
                     id="row2"
                     style="display:none;">

                    <input type="text"
                           id="lastfm2"
                           placeholder="USERNAME">

                    <span class="primaryBtn"
                          data-slot="2">
                        ○
                    </span>

                </div>

                <!-- SLOT 3 -->
                <div class="lastfmRow"
                     id="row3"
                     style="display:none;">

                    <input type="text"
                           id="lastfm3"
                           placeholder="USERNAME">

                    <span class="primaryBtn"
                          data-slot="3">
                        ○
                    </span>

                </div>

                <!-- SLOT 4 -->
                <div class="lastfmRow"
                     id="row4"
                     style="display:none;">

                    <input type="text"
                           id="lastfm4"
                           placeholder="USERNAME">

                    <span class="primaryBtn"
                          data-slot="4">
                        ○
                    </span>

                </div>

                <!-- SLOT 5 -->
                <div class="lastfmRow"
                     id="row5"
                     style="display:none;">

                    <input type="text"
                           id="lastfm5"
                           placeholder="USERNAME">

                    <span class="primaryBtn"
                          data-slot="5">
                        ○
                    </span>

                </div>

            </div>

            <!-- ADD LASTFM -->
            <button id="addLastfm">
                + ADD LAST.FM
            </button>

            <!-- SAVE -->
            <button id="saveProfile">
                SAVE PROFILE
            </button>

            <!-- LOGOUT -->
            <button id="logout">
                LOGOUT
            </button>

        </div>

    </div>

    <!-- TOAST -->
    <div id="toast">
        ✓ PROFILE SAVED
    </div>

    <script type="module"
            src="profile.js">
    </script>

</body>

</html>
