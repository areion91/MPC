<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stream4Stream | Profile</title>

    <link rel="stylesheet"
          href="profile.css">

</head>

<body>

    <div class="container">

        <div class="box">

            <h1>
                PROFILE
            </h1>

            <div class="avatarBox">

                <img id="profileAvatar">

                <input type="file"
                       id="uploadPhoto"
                       accept="image/*">

            </div>

            <div class="inputBox">

                <label>
                    NAME
                </label>

                <input type="text"
                       id="profileName">

            </div>

            <div class="inputBox">

                <label>
                    PHONE
                </label>

                <input type="text"
                       id="profilePhone">

            </div>

            <div class="inputBox">

                <label>
                    LAST.FM USERNAME
                </label>

                <input type="text"
                       id="profileLastfm">

            </div>

            <button id="saveProfile">
                SAVE PROFILE
            </button>

            <button id="backDashboard">
                BACK
            </button>

        </div>

    </div>

    <script type="module"
            src="profile.js">
    </script>

</body>

</html>
