<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Stream4Stream | Indie Trending
    </title>

    <link rel="stylesheet"
          href="indie.css">

</head>

<body>

    <div class="container">

        <div class="box">

            <!-- BACK -->
            <div id="backBtn">
                ← BACK
            </div>

            <!-- TITLE -->
            <h1 id="playlistTitle">
                INDIE TRENDING
            </h1>

            <div class="line"></div>

            <!-- MEMBER -->
            <div id="joinedCount">
                27 JOINED TRACK
            </div>

            <!-- PROGRESS -->
            <div class="progressBox">

                <div class="progressText">
                    PROGRESS 100%
                </div>

                <div class="progressBar">

                    <div id="progressFill"></div>

                </div>

            </div>

            <!-- CHECKIN -->
            <button id="checkin">
                CHECK-IN
            </button>

            <div class="line"></div>

            <!-- TRACKS -->
            <div id="trackList">

                <div class="track">

                    <div class="trackNumber">
                        01.
                    </div>

                    <div class="trackInfo">

                        <div class="trackSong">
                            Numb
                        </div>

                        <div class="trackArtist">
                            Linkin Park
                        </div>

                    </div>

                </div>

                <div class="track">

                    <div class="trackNumber">
                        02.
                    </div>

                    <div class="trackInfo">

                        <div class="trackSong">
                            Yellow
                        </div>

                        <div class="trackArtist">
                            Coldplay
                        </div>

                    </div>

                </div>

                <div class="track">

                    <div class="trackNumber">
                        03.
                    </div>

                    <div class="trackInfo">

                        <div class="trackSong">
                            Somebody Else
                        </div>

                        <div class="trackArtist">
                            The 1975
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div id="toast">
        ✓ CHECK-IN SUCCESS
    </div>

    <script type="module"
            src="indie.js">
    </script>

</body>

</html>
