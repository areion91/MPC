<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>Stream4Stream Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<div class="box">

    <!-- AVATAR -->
    <img id="profileBtn"
    src="avatar.png">

    <!-- ICON -->
    <div class="notes">
        ♪ ♬ ♪ ♬ ♪
    </div>

    <!-- TITLE -->
    <h1>STREAM4STREAM</h1>
    <p class="subtitle">
        COMMUNITY HUB
    </p>

    <!-- USER -->
    <div class="welcome">
        WELCOME,
        <span id="username">
            MEMBER
        </span>
    </div>

    <!-- PLAYLIST -->
    <div class="playlistBox">

        <div class="playlist"
        onclick="location.href='free.html'">

            <img src="free.png">

            <h2>FREE</h2>

            <p id="freeDesc">
                FREE PLAYLIST
            </p>

        </div>

        <div class="playlist"
        onclick="location.href='premium.html'">

            <img src="premium.png">

            <h2>PREMIUM</h2>

            <p id="premiumDesc">
                PREMIUM PLAYLIST
            </p>

        </div>

    </div>

    <!-- ADMIN -->
    <div id="adminArea"
    style="display:none;">

        <button id="adminBtn"
        onclick="location.href='admin.html'">
            ADMIN PANEL
        </button>

    </div>

    <!-- EQ -->
    <div class="equalizer">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>
</div>

<script src="dashboard.js"></script>

</body>
</html>
