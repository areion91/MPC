<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Indie Trending
    </title>

    <link rel="stylesheet"
          href="indie.css">

</head>

<body>

    <div class="container">

        <div class="box">

            <div id="backBtn">
                ← BACK
            </div>

            <h1>
                INDIE TRENDING TEST
            </h1>

            <div class="line"></div>

            <p class="joined">
                27 JOINED TRACK
            </p>

            <div class="progressBox">

                <div class="progressBar">

                    <div id="progressFill"></div>

                </div>

                <div id="progressText">
                    0%
                </div>

            </div>

            <button id="checkin"
                    disabled>

                CHECK-IN

            </button>

            <div class="line"></div>

            <div id="trackList">

                <div class="track">
                    <span>01.</span>
                    <div>
                        Artist Name<br>
                        Song Title
                    </div>
                </div>

                <div class="track">
                    <span>02.</span>
                    <div>
                        Artist Name<br>
                        Song Title
                    </div>
                </div>

                <div class="track">
                    <span>03.</span>
                    <div>
                        Artist Name<br>
                        Song Title
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script type="module"
            src="indie.js">
    </script>

</body>

</html>
