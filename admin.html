<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1.0">

    <title>

        Stream4Stream Admin

    </title>

    <link rel="stylesheet"
          href="admin.css">

</head>

<body>

<div class="container">

    <div class="box">

        <!-- BACK -->

        <div id="backBtn">

            ← BACK

        </div>

        <!-- NOTES -->

        <div class="notes">

            ♪ ♫ ♪ ♫ ♪

        </div>

        <!-- TITLE -->

        <div class="title">

            <h1>

                ADMIN HUB

            </h1>

            <p>

                STREAM4STREAM

            </p>

        </div>

        <!-- STATUS -->

        <div id="status">

            READY

        </div>

        <!-- MENU -->

        <div class="menuContainer">

            <!-- JOIN REQUEST -->

            <div id="joinBtn"
                 class="menuCard">

                <div class="menuTitle">

                    JOIN REQUEST

                </div>

                <div id="joinCount"
                     class="badge">

                    0

                </div>

            </div>

            <!-- SONG REQUEST -->

            <div id="songBtn"
                 class="menuCard gold">

                <div class="menuTitle">

                    SONG REQUEST

                </div>

                <div id="songCount"
                     class="badge">

                    0

                </div>

            </div>

            <!-- PLAYLIST -->

            <div id="playlistBtn"
                 class="menuCard">

                <div class="menuTitle">

                    PLAYLIST

                </div>

            </div>

            <!-- SYNC -->

            <div id="syncBtn"
                 class="menuCard">

                <div class="menuTitle">

                    SYNC

                </div>

            </div>

            <!-- ANNOUNCEMENT -->

            <div id="announceBtn"
                 class="menuCard">

                <div class="menuTitle">

                    ANNOUNCEMENT

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- JOIN POPUP -->
<!-- ===================== -->

<div id="joinPopup"
     class="popup">

    <div class="popupBox">

        <h2>

            JOIN REQUEST

        </h2>

        <div id="joinList">

        </div>

        <div class="popupButtons">

            <button id="closeJoin">

                CLOSE

            </button>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- SONG POPUP -->
<!-- ===================== -->

<div id="songPopup"
     class="popup">

    <div class="popupBox">

        <h2>

            SONG REQUEST

        </h2>

        <div id="songList">

        </div>

        <div class="popupButtons">

            <button id="closeSong">

                CLOSE

            </button>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- PLAYLIST POPUP -->
<!-- ===================== -->

<div id="playlistPopup"
     class="popup">

    <div class="popupBox">

        <h2>

            PLAYLIST

        </h2>

        <div id="playlistList">

            <div class="menuCard playlistCard"
                 data-playlist="primezone">
                PRIME ZONE
            </div>

            <div class="menuCard playlistCard"
                 data-playlist="upmood">
                UPMOOD
            </div>

            <div class="menuCard playlistCard"
                 data-playlist="lagimellow">
                LAGI MELLOW
            </div>

            <div class="menuCard playlistCard"
                 data-playlist="chillheal">
                CHILL & HEAL
            </div>

            <div class="menuCard playlistCard"
                 data-playlist="globalindiemix">
                GLOBAL INDIE MIX
            </div>

            <div class="menuCard playlistCard"
                 data-playlist="breakbeatrising">
                BREAKBEAT RISING
            </div>

            <div class="menuCard playlistCard"
                 data-playlist="indienewmix">
                INDIE NEW MIX
            </div>

        </div>

        <div class="popupButtons">

            <button id="closePlaylist">

                CLOSE

            </button>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- ANNOUNCEMENT -->
<!-- ===================== -->

<div id="announcePopup"
     class="popup">

    <div class="popupBox">

        <h2>

            ANNOUNCEMENT

        </h2>

        <textarea id="announceText"
                  placeholder="Write announcement...">
        </textarea>

        <div class="popupButtons">

            <button id="saveAnnouncement">

                SAVE

            </button>

            <button id="closeAnnouncement">

                CLOSE

            </button>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- SYNC POPUP -->
<!-- ===================== -->

<div id="syncPopup"
     class="popup">

    <div class="popupBox">

        <h2>

            SYNC PLAYLIST

        </h2>

        <div id="syncList">

        </div>

        <div class="popupButtons">

            <button id="closeSync">

                CLOSE

            </button>

        </div>

    </div>

</div>

<script type="module"
        src="admin.js">
</script>

</body>
</html>
