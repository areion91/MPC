<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Stream4Stream | Playlist Premium
    </title>

    <link rel="stylesheet"
          href="premium.css">

</head>

<body>

    <!-- BACK -->
    <div id="backBtn">
        ← BACK
    </div>

    <!-- PROFILE -->
    <div id="profileBtn">
        <img id="avatar">
    </div>

    <div class="header">

        <h1>
            PLAYLIST PREMIUM
        </h1>

    </div>

        <!-- PRIME -->

        <div class="playlistItem"

            <div class="disc">
                <img id="primeCover">
            </div>

            <div class="playlistInfo">

                <h2>
                    PRIME ZONE
                </h2>

                <p>

                    <span id="primeDesc">
                    </span>

                    <span id="editPrimeDesc"
                          class="edit">
                        ✏
                    </span>

                </p>

            </div>

        </div>
