<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
    PRIME ZONE
</title>

<link rel="stylesheet"
      href="prime.css">

</head>

<body>

<!-- BACK -->

<div id="backBtn">

    ← BACK

</div>

<!-- PROFILE -->

<div id="profileBtn">

    <img id="avatar">

</div>

<!-- HEADER -->

<div class="playlistHeader">

    <div class="playlistCover">

        <img id="playlistCover">

    </div>

    <div class="playlistInfo">

        <h1 id="playlistTitle">

            PRIME ZONE

        </h1>

        <div id="playlistDesc">

            Dreamy healing night vibe.

        </div>

        <div class="playlistStats">

            <span id="playlistSongs">

                0 SONGS

            </span>

            <span id="playlistMembers">

                0 MEMBERS

            </span>

        </div>

        <div class="progressRow">

            <div class="progressBar">

                <div id="progressFill">

                </div>

            </div>

            <span id="progressValue">

                0%

            </span>

        </div>

    </div>

</div>

<!-- CHECKIN -->

<div class="checkArea">

    <button id="checkinBtn">

        CHECK IN

    </button>

    <div id="checkinInfo">

        0 / 2 CHECKIN TODAY

    </div>

</div>

<!-- TABS -->

<div class="tabs">

    <button class="tab active"
            data-tab="songs">

        SONG

    </button>

    <button class="tab"
            data-tab="member">

        MEMBER

    </button>

    <button class="tab"
            data-tab="activity">

        ACTIVITY

    </button>

</div>

<!-- CONTENT -->

<div class="content">

    <!-- SONG -->

    <div class="tabContent active"
         id="songs">

        <div id="songList">

            <div class="empty">

                Loading playlist...

            </div>

        </div>

    </div>

    <!-- MEMBER -->

    <div class="tabContent"
         id="member">

        <!-- BELUM JOIN -->

        <div id="joinArea">

            <button id="joinBtn">

                JOIN AS LISTENER

            </button>

        </div>

        <!-- WAITING -->

        <div id="waitingArea"
             style="display:none;">

            WAITING APPROVAL

        </div>

        <!-- MEMBER LIST -->

        <div id="memberList">

        </div>

        <!-- ADMIN CONTROL -->

        <div id="adminControl">

            <button id="resetMemberBtn">

                RESET

            </button>

        </div>

    </div>

    <!-- ACTIVITY -->

    <div class="tabContent"
         id="activity">

        <div id="activityList">

            <div class="empty">

                No activity.

            </div>

        </div>

    </div>

</div>

<!-- HISTORY MODAL -->

<div id="historyModal">

    <div class="historyBox">

        <div class="historyHeader">

            <span id="historyName">

                MEMBER

            </span>

            <button id="closeHistory">

                ✕

            </button>

        </div>

        <div id="historyContent">

        </div>

    </div>

</div>

<!-- RESET MODAL -->

<div id="resetModal">

    <div class="resetBox">

        <div class="resetTitle">

            SERIOUSLY?

        </div>

        <div class="resetButtons">

            <button id="resetYes">

                YEA

            </button>

            <button id="resetNo">

                NO

            </button>

        </div>

    </div>

</div>

<script type="module"
        src="prime.js">

</script>

</body>

</html>
